<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heatmap — NIST CSF 2.0</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    #chart { width:100%; height:calc(100vh - 200px); min-height:400px; }
    svg { display:block; }

    .node { cursor:pointer; }
    .node rect { stroke:#0f172a; stroke-width:1px; }
    .node:hover rect { opacity:.82; }
    .node text { pointer-events:none; font-family:'Segoe UI',system-ui,sans-serif; fill:#000; }

    /* Breadcrumb */
    #breadcrumb {
      display:flex; align-items:center; gap:.4rem; flex-wrap:wrap;
      background:#1e293b; border:1px solid #475569; border-radius:8px;
      padding:.5rem .85rem; margin-bottom:.6rem; font-size:.85rem;
    }
    .bc-item {
      color:#3b82f6; cursor:pointer; padding:.2rem .45rem;
      border-radius:4px; transition:background .15s;
    }
    .bc-item:hover { background:#334155; }
    .bc-item.current { color:#f1f5f9; cursor:default; font-weight:600; }
    .bc-sep { color:#475569; }

    /* Hint bar */
    #hint {
      font-size:.78rem; color:#64748b; margin-bottom:.5rem;
    }

    /* Tooltip */
    #tooltip {
      position:fixed; display:none; pointer-events:none;
      background:#0f172a; border:1px solid #334155; color:#f1f5f9;
      border-radius:6px; padding:.5rem .75rem; font-size:.82rem;
      font-family:'Segoe UI',system-ui,sans-serif; max-width:260px;
      line-height:1.5; z-index:9999; box-shadow:0 4px 16px rgba(0,0,0,.5);
    }

    /* KRI Panel */
    #kri-panel {
      display:none; background:#1e293b; border:1px solid #475569;
      border-radius:8px; padding:1rem; margin-top:.75rem;
    }
    #kri-panel.open { display:block; }
    .kri-card {
      background:#0f172a; border:1px solid #334155; border-radius:6px;
      padding:.75rem; margin-bottom:.5rem;
    }
    .kri-card:last-child { margin-bottom:0; }
  </style>
</head>
<body>
<div class="app-container">
  <header class="topbar">
    <a class="topbar-brand" href="/heatmap.html">
      <div class="shield">🛡</div><span>CISOToolkit</span>
    </a>
    <nav class="topbar-nav">
      <a href="/heatmap.html" class="active">Heatmap</a>
      <a href="/data.html">Key Risk Indicators</a>
    </nav>
    <div class="topbar-spacer"></div>
    <div class="topbar-user">
      <span>👤 <span id="topbarUser"></span></span>
      <button class="btn-logout" id="logoutBtn">Salir</button>
    </div>
  </header>

  <main class="main" style="padding-bottom:0">
    <div class="page-header" style="margin-bottom:.6rem">
      <h1>NIST Cybersecurity Framework 2.0</h1>
      <p>Heatmap of Key Risk Indicators</p>
    </div>
    <div id="breadcrumb"></div>
    <div id="hint">Click en un nodo para navegar</div>
  </main>

  <!-- Chart fuera del contenedor centrado para ocupar todo el ancho -->
  <div style="padding:0 1rem;box-sizing:border-box;width:100%">
    <div id="chart"></div>

    <!-- KRI Panel -->
    <div id="kri-panel">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;
                  margin-bottom:.75rem;padding-bottom:.6rem;border-bottom:1px solid #475569">
        <div>
          <div style="font-weight:700;font-size:.95rem" id="kp-title"></div>
          <div style="font-size:.8rem;color:#94a3b8;margin-top:.15rem" id="kp-desc"></div>
        </div>
        <button id="kp-close"
          style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:1.1rem">✕</button>
      </div>
      <div id="kp-list"></div>
    </div>
  </div>
</div>
<div id="tooltip"></div>

<script src="/js/common.js"></script>
<script>
'use strict';

// ── Color helpers ─────────────────────────────────────────────────────────────
function cmmiColor(v) {
  if (v == null) return '#475569';
  const stops = [[0,'#ef4444'],[20,'#f97316'],[40,'#fbbf24'],[60,'#a3e635'],[80,'#16a34a'],[100,'#16a34a']];
  for (let i = 0; i < stops.length - 1; i++) {
    if (v >= stops[i][0] && v <= stops[i+1][0])
      return d3.interpolateRgb(stops[i][1], stops[i+1][1])(
        (v - stops[i][0]) / (stops[i+1][0] - stops[i][0]));
  }
  return '#16a34a';
}
function cmmiLabel(v) {
  if (v == null) return 'Sin datos';
  if (v <= 20) return 'N1 Inicial';
  if (v <= 40) return 'N2 Gestionado';
  if (v <= 60) return 'N3 Definido';
  if (v <= 80) return 'N4 Cuant. Gestionado';
  return 'N5 Optimizado';
}

// ── Build full D3 hierarchy ───────────────────────────────────────────────────
function buildHierarchy(api) {
  return d3.hierarchy({
    name:'NIST CSF 2.0', code:'ROOT', type:'root',
    children: api.map(fn => ({
      name:fn.name, code:fn.code, type:'function', valoracion:fn.avgValoracion,
      children: fn.categories.map(cat => ({
        name:cat.name, code:cat.code, type:'category', valoracion:cat.avgValoracion,
        fnCode:fn.code, fnName:fn.name,
        children: cat.subcategories.map(s => ({
          name:s.code, code:s.code, type:'subcategory',
          description:s.description, valoracion:s.valoracion,
          kri_name:s.kri_name, subId:s.id,
          fnCode:fn.code, fnName:fn.name,
          catCode:cat.code, catName:cat.name,
          value:1
        }))
      }))
    }))
  }).sum(d => d.value || 0).sort((a, b) => b.value - a.value);
}

// ── State ─────────────────────────────────────────────────────────────────────
let rootH    = null;   // full d3 hierarchy
let focusNode = null;  // currently visible subtree root
const tip    = document.getElementById('tooltip');

// ── Main ──────────────────────────────────────────────────────────────────────
(async () => {
  await initTopbar(null);

  const api = await (await fetch('/api/heatmap')).json();
  rootH     = buildHierarchy(api);
  focusNode = rootH;

  render();

  document.getElementById('kp-close').addEventListener('click', () =>
    document.getElementById('kri-panel').classList.remove('open'));
})();

// ── Render treemap from focusNode ─────────────────────────────────────────────
function render() {
  // Remove old SVG first so the container can shrink freely before measuring
  d3.select('#chart').selectAll('svg').remove();

  const el = document.getElementById('chart');
  const W  = el.clientWidth;
  const H  = el.clientHeight || (window.innerHeight - 260);
  el.style.height = H + 'px';

  // Re-run layout on the focused subtree
  const subtreeData = focusNode.data;
  const subtreeH    = d3.hierarchy(subtreeData)
    .sum(d => d.value || 0)
    .sort((a, b) => b.value - a.value);

  d3.treemap()
    .size([W, H])
    .paddingOuter(focusNode === rootH ? 5 : 3)
    .paddingTop(d => d.depth === 1 ? 26 : 1)
    .paddingInner(2)
    .tile(d3.treemapResquarify)
    (subtreeH);
  const svg = d3.select('#chart').append('svg')
    .attr('width', W).attr('height', H)
    .style('display','block')
    .style('max-width','100%')
    .style('background','#1e293b')
    .style('border-radius','8px')
    .style('border','1px solid #475569');

  // ── Parent group backgrounds ──────────────────────────────────────────────
  const parents = subtreeH.descendants().filter(d => d.depth === 1 && d.children);

  svg.selectAll('.bg')
    .data(parents).join('rect').attr('class','bg')
    .attr('x', d=>d.x0).attr('y', d=>d.y0)
    .attr('width', d=>d.x1-d.x0).attr('height', d=>d.y1-d.y0)
    .attr('fill', 'none')
    .attr('stroke', '#475569').attr('stroke-width', 1)
    .attr('rx', 5);

  // Parent header labels
  svg.selectAll('.bg-lbl')
    .data(parents).join('text').attr('class','bg-lbl')
    .attr('x', d=>d.x0+5).attr('y', d=>d.y0+17)
    .attr('font-size', 14).attr('font-weight', 700)
    .attr('fill', d => d.data.type === 'function' ? '#fff' : '#000').attr('pointer-events','none')
    .text(d => {
      const label = `${d.data.code} · ${d.data.name}`;
      return label;
    });

  // ── Leaf nodes ────────────────────────────────────────────────────────────
  const leaves = subtreeH.leaves();

  // Clip paths — one per node so text never overflows the box
  const defs = svg.append('defs');
  leaves.forEach((d, i) => {
    defs.append('clipPath').attr('id', `nc-${i}`)
      .append('rect')
        .attr('width',  Math.max(0, d.x1-d.x0))
        .attr('height', Math.max(0, d.y1-d.y0));
  });

  const nodeG  = svg.selectAll('.node')
    .data(leaves).join('g').attr('class','node')
    .attr('transform', d => `translate(${d.x0},${d.y0})`)
    .attr('clip-path', (d, i) => `url(#nc-${i})`);

  nodeG.append('rect')
    .attr('width',  d => Math.max(0, d.x1-d.x0))
    .attr('height', d => Math.max(0, d.y1-d.y0))
    .attr('fill',   d => cmmiColor(d.data.valoracion))
    .attr('rx', 2)
    .attr('cursor', d => d.data.type === 'subcategory' ? 'pointer' : 'zoom-in')

  // helpers — font sizes scale purely with node width, no hard minimum
  const catFs  = d => Math.min(13, (d.x1-d.x0) / 7);
  const codeFs = d => Math.min(13, Math.max(8, (d.x1-d.x0) / 4.5));
  const showCat = d => (d.y1-d.y0) > 28 && catFs(d) >= 8;

  // Render all text per node with proper word-wrap for category name
  nodeG.each(function(d) {
    const g   = d3.select(this);
    const nw  = d.x1 - d.x0, nh = d.y1 - d.y0;
    const pad = 4, maxW = nw - pad * 2;
    const cfSize = catFs(d), cdSize = codeFs(d);
    let curY = pad;

    // ── Category name with word-wrap ──────────────────────────────────────
    if (showCat(d)) {
      const t = g.append('text')
        .attr('font-size', cfSize).attr('font-weight', 600)
        .attr('fill', 'rgba(0,0,0,.75)');

      const words = (d.data.catName || '').split(/\s+/);
      let line = [], lineCount = 1;
      let tspan = t.append('tspan').attr('x', pad).attr('y', curY + cfSize);

      for (const word of words) {
        const candidate = [...line, word].join(' ');
        tspan.text(candidate);
        if (line.length > 0 && tspan.node().getComputedTextLength() > maxW) {
          tspan.text(line.join(' '));   // revert to line without overflow word
          line = [word];
          lineCount++;
          tspan = t.append('tspan').attr('x', pad).attr('dy', cfSize * 1.25).text(word);
        } else {
          line = [...line, word];
        }
      }
      curY += cfSize + (lineCount - 1) * cfSize * 1.25 + cfSize * 1.1; // extra gap = line break
    }

    // ── Subcategory code (truncate — codes have no spaces to wrap) ────────
    if (cdSize >= 6) {
      const t = g.append('text')
        .attr('x', pad).attr('y', curY + cdSize)
        .attr('font-size', cdSize).attr('font-weight', 700)
        .attr('fill', '#000')
        .text(d.data.code);
      const tn = t.node();
      while (tn.getComputedTextLength() > maxW && t.text().length > 1)
        t.text(t.text().slice(0, -2) + '…');
    }


  });

  // ── Click handler ─────────────────────────────────────────────────────────
  nodeG.on('click', (event, d) => {
    tip.style.display = 'none';
    if (d.data.type === 'subcategory') {
      openKriPanel(d.data);
    } else {
      // Drill into this node in the full hierarchy
      rootH.each(n => {
        if (n.data.code === d.data.code && n.data.type === d.data.type)
          focusNode = n;
      });
      document.getElementById('kri-panel').classList.remove('open');
      render();
      updateBreadcrumb();
    }
  });

  // ── Parent header click (drill into that group) ───────────────────────────
  svg.selectAll('.bg-click')
    .data(parents).join('rect').attr('class','bg-click')
    .attr('x', d=>d.x0).attr('y', d=>d.y0)
    .attr('width', d=>d.x1-d.x0).attr('height', 21)
    .attr('fill','transparent').attr('cursor','zoom-in')
    .on('click', (event, d) => {
      rootH.each(n => {
        if (n.data.code === d.data.code && n.data.type === d.data.type)
          focusNode = n;
      });
      document.getElementById('kri-panel').classList.remove('open');
      render();
      updateBreadcrumb();
    });

  // ── Tooltip ───────────────────────────────────────────────────────────────
  nodeG.on('mouseover', (e, d) => {
      const v = d.data.valoracion;
      const isSubcat = d.data.type === 'subcategory';
      tip.innerHTML = `
        <div style="font-size:.72rem;color:#64748b;margin-bottom:.25rem">
          ${d.data.fnName || ''}
          ${d.data.catName ? ` <span style="color:#475569">›</span> ${d.data.catName}` : ''}
        </div>
        <b style="font-size:.92rem">${d.data.code}</b>
        ${d.data.description ? `<br><span style="color:#94a3b8;font-size:.78rem">${d.data.description.substring(0,100)}</span>` : ''}
        <br><span style="color:#64748b;font-size:.75rem;margin-top:.2rem;display:inline-block">Val: </span>
        <b style="color:${cmmiColor(v)}">${v!=null?Number(v).toFixed(1):'—'}</b>
        <span style="color:#94a3b8;font-size:.78rem"> · ${cmmiLabel(v)}</span>
        <br><span style="color:#475569;font-size:.72rem">${isSubcat?'Click para ver KRIs':'Click para hacer drilldown'}</span>`;
      tip.style.display='block';
    })
    .on('mousemove', e => {
      tip.style.left=`${Math.min(e.clientX+14,window.innerWidth-270)}px`;
      tip.style.top =`${Math.min(e.clientY+14,window.innerHeight-110)}px`;
    })
    .on('mouseout', () => tip.style.display='none');

  // Hint update
  const hints = { root:'Function> Category> Subcategory>',
                  function:'Click en una Categoría para ver Subcategorías',
                  category:'Click en una Subcategoría para ver sus KRIs' };
  document.getElementById('hint').textContent = hints[focusNode.data.type] || '';

  updateBreadcrumb();
  window.onresize = render;
}

// ── Breadcrumb ────────────────────────────────────────────────────────────────
function updateBreadcrumb(subData) {
  // Build path from focusNode ancestors
  const path = focusNode.ancestors().reverse(); // [root, fn?, cat?]

  // If a subcategory was clicked, build the full path using its stored ancestors
  let items;
  if (subData) {
    // Always show full chain: root → function → category → subcategory
    items = [
      { label: 'NIST CSF 2.0',                                                  navIdx: 0 },
      { label: subData.fnName.toUpperCase(),                                     navCode: subData.fnCode, navType: 'function' },
      { label: subData.catName.toUpperCase(),                                    navCode: subData.catCode, navType: 'category' },
      { label: (subData.description||subData.code).substring(0,50).toUpperCase(), isCurrent: true },
    ];
  } else {
    items = path.map((node, i) => ({
      label: node.data.code === 'ROOT'
        ? 'NIST CSF 2.0'
        : (node.data.name || node.data.code).toUpperCase(),
      navIdx: i,
      isCurrent: i === path.length - 1,
    }));
  }

  document.getElementById('breadcrumb').innerHTML = items.map((item, i) =>
    `${i > 0 ? '<span class="bc-sep"> — </span>' : ''}
     <span class="bc-item ${item.isCurrent ? 'current' : ''}"
           data-i="${item.navIdx ?? -1}"
           data-code="${item.navCode || ''}"
           data-type="${item.navType || ''}">${item.label}</span>`
  ).join('');

  document.querySelectorAll('.bc-item:not(.current)').forEach(el => {
    el.addEventListener('click', () => {
      document.getElementById('kri-panel').classList.remove('open');
      const code = el.dataset.code;
      const type = el.dataset.type;
      if (code) {
        // Navigate to this node in the full hierarchy
        rootH.each(n => {
          if (n.data.code === code && n.data.type === type) focusNode = n;
        });
      } else {
        focusNode = path[parseInt(el.dataset.i)] || rootH;
      }
      render();
    });
  });
}

// ── KRI Panel ────────────────────────────────────────────────────────────────
async function openKriPanel(sub) {
  updateBreadcrumb(sub);   // añade la subcategoría al breadcrumb sin cambiar focusNode
  const panel = document.getElementById('kri-panel');
  document.getElementById('kp-title').textContent = `${sub.fnName}  ·  ${sub.catName}`;
  document.getElementById('kp-desc').textContent  = `${sub.code} — ${sub.description || ''}`;
  document.getElementById('kp-list').innerHTML    =
    '<div style="color:#94a3b8;font-size:.82rem">Cargando KRIs…</div>';
  panel.classList.add('open');
  panel.scrollIntoView({ behavior:'smooth', block:'start' });

  try {
    const rows = await (await fetch(`/api/kris?subcategoryId=${sub.subId}`)).json();
    const kris = rows.filter(r => r.kri_id);

    if (!kris.length) {
      document.getElementById('kp-list').innerHTML =
        '<div style="color:#64748b;font-style:italic;font-size:.85rem">Sin KRIs asignados.</div>';
      return;
    }

    document.getElementById('kp-list').innerHTML = kris.map(k => {
      const v   = k.valoracion != null ? Number(k.valoracion).toFixed(1) : null;
      const col = cmmiColor(k.valoracion);
      return `
        <div class="kri-card">
          <div style="font-weight:600;margin-bottom:.25rem">${k.kri_name}</div>
          ${k.kri_description
            ? `<div style="font-size:.78rem;color:#94a3b8;margin-bottom:.3rem">${k.kri_description}</div>` : ''}
          ${k.kri_formula
            ? `<div style="font-size:.75rem;color:#64748b;font-style:italic;margin-bottom:.35rem">Fórmula: ${k.kri_formula}</div>` : ''}
          <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
            ${v != null
              ? `<span style="font-weight:700;font-size:.95rem;padding:.1rem .45rem;
                             border-radius:4px;background:${col};color:#fff">${v}</span>` : ''}
            <span style="font-size:.78rem;color:#94a3b8">${cmmiLabel(k.valoracion)}</span>
            ${k.last_saved_by
              ? `<span style="font-size:.75rem;color:#64748b">· ${k.last_saved_by}</span>` : ''}
          </div>
        </div>`;
    }).join('');
  } catch {
    document.getElementById('kp-list').innerHTML =
      '<div style="color:#ef4444;font-size:.85rem">Error al cargar.</div>';
  }
}
</script>
</body>
</html>
