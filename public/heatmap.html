<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heatmap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
</head>
<body>
<div class="app">

  <!-- ── Topbar ──────────────────────────────────────────────────────────── -->
  <header class="topbar">
    <a class="brand" href="/heatmap.html">
      <div class="brand-mark">🛡</div>
      <span>CISOToolkit</span>
    </a>
    <div class="topbar-divider"></div>
    <nav class="topbar-nav">
      <a href="/heatmap.html" class="active">Heatmap</a>
      <a href="/data.html">Key Risk Indicators</a>
      <a href="/admin.html" id="adminLink" style="display:none">Admin</a>
    </nav>
    <div class="topbar-spacer"></div>
    <div class="topbar-right">
      <div class="live-badge">
        <div class="live-dot"></div>
        LIVE
      </div>
      <div class="topbar-user">
        <div class="avatar">👤</div>
        <span id="topbarUser" style="font-size:.78rem"></span>
        <button class="btn-logout" id="logoutBtn">Salir</button>
      </div>
    </div>
  </header>

  <!-- ── Sub-bar (breadcrumb) ────────────────────────────────────────────── -->
  <div class="hm-subbar">
    <div id="breadcrumb"></div>
    <div id="hint"></div>
  </div>

  <!-- ── HUD stats strip ─────────────────────────────────────────────────── -->
  <div class="hm-hud">
    <!-- Page title (matches data.html style) -->
    <div class="page-header hm-page-header">
      <div class="page-header-text">
        <div class="page-header-framework">NIST Cybersecurity Framework 2.0</div>
        <div class="page-header-title">Heatmap of Key Risk Indicators</div>
      </div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-stat">
      <span class="hud-val" id="stat-total">—</span>
      <span class="hud-lbl">Subcats</span>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-stat">
      <span class="hud-val" id="stat-withkri">—</span>
      <span class="hud-lbl">Scored</span>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-stat">
      <span class="hud-val hud-val--n1" id="stat-n1">—</span>
      <span class="hud-lbl">Critical N1</span>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-stat">
      <span class="hud-val hud-val--avg" id="stat-avg">—</span>
      <span class="hud-lbl">Avg Score</span>
    </div>
    <div class="hud-spacer"></div>

    <!-- Legend -->
    <div class="hm-legend">
      <div class="hm-legend-item"><div class="hm-legend-swatch hm-swatch-n1"></div>N1</div>
      <div class="hm-legend-item"><div class="hm-legend-swatch hm-swatch-n2"></div>N2</div>
      <div class="hm-legend-item"><div class="hm-legend-swatch hm-swatch-n3"></div>N3</div>
      <div class="hm-legend-item"><div class="hm-legend-swatch hm-swatch-n4"></div>N4</div>
      <div class="hm-legend-item"><div class="hm-legend-swatch hm-swatch-n5"></div>N5</div>
      <div class="hm-legend-item"><div class="hm-legend-swatch hm-swatch-nd"></div>ND</div>
    </div>

    <!-- Export -->
    <div class="hm-export-wrap">
      <select id="exportFormat">
        <option value="json">JSON</option>
        <option value="csv">CSV</option>
        <option value="xml">XML</option>
        <option value="xlsx">XLSX</option>
      </select>
      <button class="btn-hm-export" id="btnExport">⬇ Export</button>
    </div>
  </div>

  <!-- ── Canvas: treemap + KRI panel ────────────────────────────────────── -->
  <div class="hm-canvas-row">
    <div id="chart"></div>

    <div class="kri-panel-wrap" id="kri-panel-wrap">
      <div class="kri-panel-inner">
        <div class="kri-panel-header">
          <div style="flex:1;min-width:0">
            <div class="kri-panel-badge" id="kp-badge">—</div>
            <div class="kri-panel-title" id="kp-title"></div>
            <div class="kri-panel-sub"   id="kp-desc"></div>
          </div>
          <button class="kri-panel-close" id="kp-close" title="Cerrar">✕</button>
        </div>
        <div class="kri-panel-body" id="kp-list"></div>
      </div>
    </div>
  </div>

</div><!-- /.app -->

<!-- ── Tooltip ──────────────────────────────────────────────────────────── -->
<div id="hm-tooltip"></div>

<!-- ── KRI Edit Modal ───────────────────────────────────────────────────── -->
<div id="hm-kri-modal" class="hidden">
  <div class="hm-modal-box">
    <div class="hm-modal-header">
      <div class="hm-modal-title" id="hm-modal-title">KRI</div>
      <button class="hm-modal-close" id="hm-modal-close">✕</button>
    </div>
    <div class="hm-modal-body">
      <!-- Context -->
      <div class="hm-ctx-grid">
        <div>
          <div class="hm-ctx-label">Función</div>
          <div class="hm-ctx-val" id="hm-ctx-fn"></div>
        </div>
        <div>
          <div class="hm-ctx-label">Categoría</div>
          <div class="hm-ctx-val" id="hm-ctx-cat"></div>
        </div>
        <div style="grid-column:1/-1">
          <div class="hm-ctx-label">Subcategoría</div>
          <div class="hm-ctx-val" id="hm-ctx-sub"></div>
        </div>
      </div>

      <!-- Fields -->
      <div class="form-group">
        <label class="form-label">Nombre del KRI *</label>
        <input class="form-input" type="text" id="hm-kri-name" placeholder="Policy Compliance Rate…">
      </div>
      <div class="form-group">
        <label class="form-label">Descripción</label>
        <textarea class="form-input" id="hm-kri-desc" rows="2" style="resize:vertical"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Fórmula</label>
        <input class="form-input" id="hm-kri-formula" type="text" placeholder="(eventos_críticos / total) × 100">
      </div>
      <div class="form-row" style="grid-template-columns:1fr 1fr;gap:.75rem">
        <div class="form-group" style="margin:0">
          <label class="form-label">Valoración (0–100) *</label>
          <input class="form-input" type="number" id="hm-kri-val" min="0" max="100" step="0.1" placeholder="0–100">
          <div class="hint" id="hm-cmmi-hint"></div>
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">CMMI Flag</label>
          <select class="form-input" id="hm-kri-flag">
            <option value="">— seleccionar —</option>
            <option value="POSITIVO">POSITIVO (↑ = mejor)</option>
            <option value="NEGATIVO">NEGATIVO (↑ = peor)</option>
          </select>
        </div>
      </div>

      <!-- History -->
      <div id="hm-history-box" class="hm-history-box" style="display:none">
        <div class="hm-history-title">Historial</div>
        <div id="hm-history-list"></div>
      </div>
    </div>
    <div class="hm-modal-footer">
      <button class="btn btn-danger" id="hm-btn-del" style="display:none;margin-right:auto">Eliminar</button>
      <button class="btn btn-secondary" id="hm-btn-cancel">Cancelar</button>
      <button class="btn btn-primary"  id="hm-btn-save">Guardar</button>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script src="/js/heatmap.js"></script>
</body>
</html>
