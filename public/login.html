<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key Risk Indicators — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="shield">🛡</div>
      <div>
        <div class="brand-text">CISO Toolkit</div>
        <div class="brand-sub">NIST CSF 2.0</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" type="button">Iniciar sesión</button>
      <button class="auth-tab" id="tabRegister" type="button">Crear cuenta</button>
    </div>

    <div class="login-error" id="authError"></div>

    <!-- Login form -->
    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="loginUsername" name="username" placeholder="tu@empresa.com" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="loginPassword" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-login" id="loginBtn">Entrar</button>
    </form>

    <!-- Register form (hidden by default) -->
    <form id="registerForm" autocomplete="on" style="display:none">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="regEmail" name="email" placeholder="tu@empresa.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="regPassword" name="password" placeholder="••••••••" autocomplete="new-password" required minlength="8">
      </div>
      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" id="regPasswordConfirm" name="password_confirm" placeholder="••••••••" autocomplete="new-password" required minlength="8">
      </div>
      <button type="submit" class="btn btn-primary btn-login" id="registerBtn">Crear cuenta</button>
    </form>

    <!-- Verification pending panel (hidden by default) -->
    <div id="verifyPending" style="display:none; text-align:center; padding:1rem 0">
      <div style="font-size:2.5rem; margin-bottom:.75rem">📧</div>
      <h3 style="margin:0 0 .5rem; font-size:1.1rem">Revisa tu bandeja de entrada</h3>
      <p style="color:var(--text-secondary); font-size:.9rem; margin:0">
        Te hemos enviado un enlace de verificación.<br>Haz clic en él para activar tu cuenta.
      </p>
    </div>

    <!-- Sandbox demo -->
    <div class="auth-divider" id="authDivider">o</div>
    <button class="btn-demo" id="demoBtn" type="button">Probar sin registrarse</button>
  </div>
</div>

<script>
const tabLogin    = document.getElementById('tabLogin');
const tabRegister = document.getElementById('tabRegister');
const loginForm   = document.getElementById('loginForm');
const registerForm= document.getElementById('registerForm');
const authError   = document.getElementById('authError');

function showError(msg) {
  authError.textContent = msg;
  authError.style.display = 'block';
}
function clearError() {
  authError.style.display = 'none';
}

// Tab switching
tabLogin.addEventListener('click', () => {
  tabLogin.classList.add('active');
  tabRegister.classList.remove('active');
  loginForm.style.display = '';
  registerForm.style.display = 'none';
  clearError();
});
tabRegister.addEventListener('click', () => {
  tabRegister.classList.add('active');
  tabLogin.classList.remove('active');
  registerForm.style.display = '';
  loginForm.style.display = 'none';
  clearError();
});

// Login
loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearError();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Verificando...';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('loginUsername').value.trim(),
        password: document.getElementById('loginPassword').value
      })
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/heatmap.html';
    } else {
      showError(data.error || 'Error de autenticación');
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  } catch {
    showError('Error de conexión con el servidor');
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
});

// Register
registerForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearError();
  const email           = document.getElementById('regEmail').value.trim();
  const password        = document.getElementById('regPassword').value;
  const passwordConfirm = document.getElementById('regPasswordConfirm').value;

  if (password !== passwordConfirm) {
    showError('Las contraseñas no coinciden');
    return;
  }

  const btn = document.getElementById('registerBtn');
  btn.disabled = true;
  btn.textContent = 'Creando cuenta...';

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (res.ok && data.pending) {
      registerForm.style.display = 'none';
      document.querySelector('.auth-tabs').style.display = 'none';
      document.getElementById('authDivider').style.display = 'none';
      document.getElementById('demoBtn').style.display = 'none';
      document.getElementById('verifyPending').style.display = 'block';
    } else {
      showError(data.error || 'Error al crear la cuenta');
      btn.disabled = false;
      btn.textContent = 'Crear cuenta';
    }
  } catch {
    showError('Error de conexión con el servidor');
    btn.disabled = false;
    btn.textContent = 'Crear cuenta';
  }
});

// Demo
document.getElementById('demoBtn').addEventListener('click', async () => {
  clearError();
  const btn = document.getElementById('demoBtn');
  btn.disabled = true;
  btn.textContent = 'Entrando al sandbox...';

  try {
    const res = await fetch('/api/auth/demo', { method: 'POST' });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/heatmap.html';
    } else {
      showError(data.error || 'Error al acceder al sandbox');
      btn.disabled = false;
      btn.textContent = 'Probar sin registrarse';
    }
  } catch {
    showError('Error de conexión con el servidor');
    btn.disabled = false;
    btn.textContent = 'Probar sin registrarse';
  }
});
</script>
</body>
</html>
