<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key Risk Indicators</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="app-container">

  <!-- Topbar -->
  <header class="topbar">
    <a class="brand" href="/heatmap.html">
      <div class="brand-mark">🛡</div>
      <span>CISOToolkit</span>
    </a>
    <div class="topbar-divider"></div>
    <nav class="topbar-nav">
      <a href="/heatmap.html">Heatmap</a>
      <a href="/data.html" class="active">Key Risk Indicators</a>
      <a href="/admin.html" id="adminLink" style="display:none">Admin</a>
    </nav>
    <div class="topbar-spacer"></div>
    <div class="topbar-right">
      <div class="live-badge">
        <div class="live-dot"></div>
        LIVE
      </div>
      <div class="topbar-user">
        <div class="avatar">👤</div>
        <span id="topbarUser" style="font-size:.78rem"></span>
        <button class="btn-logout" id="logoutBtn">Salir</button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <div class="page-header">
      <div class="page-header-text">
        <div class="page-header-framework">NIST Cybersecurity Framework 2.0</div>
        <div class="page-header-title">Key Risk Indicators</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="card" style="margin-bottom:1.25rem">
      <div class="filters">
        <div class="filter-group">
          <label>Función</label>
          <select id="filterFunction">
            <option value="">Todas</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Categoría</label>
          <select id="filterCategory">
            <option value="">Todas</option>
          </select>
        </div>
        <div class="filter-group">
          <label>KRI</label>
          <select id="filterKri">
            <option value="">Todos</option>
            <option value="with">Con KRI asignado</option>
            <option value="without">Sin KRI</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Búsqueda</label>
          <input type="text" id="filterSearch" placeholder="Código, descripción o KRI...">
        </div>
        <button class="btn-reset" id="btnReset">↺ Limpiar</button>
        <button class="btn-reset" id="btnToggleExamples">⊟ Ocultar ejemplos</button>
        <div style="display:flex;align-items:center;gap:.4rem;margin-left:auto">
          <select id="exportFormat" style="background:var(--bg-base);border:1px solid var(--border-soft);color:var(--text-primary);border-radius:6px;padding:.45rem .7rem;font-size:.85rem;cursor:pointer">
            <option value="json">JSON</option>
            <option value="csv">CSV</option>
            <option value="xml">XML</option>
            <option value="xlsx">Excel (.xlsx)</option>
          </select>
          <button class="btn-reset" id="btnExport">⬇ Exportar</button>
        </div>
      </div>
      <div style="font-size:.8rem;color:var(--text-secondary)" id="resultCount"></div>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Función</th>
            <th>Categoría</th>
            <th>Subcategoría</th>
            <th>Ejemplos</th>
            <th>KRI</th>
            <th style="text-align:center">Valoración</th>
            <th style="text-align:center">CMMI</th>
            <th style="text-align:center">Última actualización</th>
            <th style="text-align:center;white-space:nowrap;min-width:90px">Acciones</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="8" class="table-empty">Cargando datos...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Examples Modal -->
<div class="modal-overlay hidden" id="examplesModal">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <div class="modal-title">
        <h2 id="exModalCode">—</h2>
        <p id="exModalDesc">—</p>
      </div>
      <button class="modal-close" id="exModalClose">✕</button>
    </div>
    <div class="modal-body" style="max-height:65vh;overflow-y:auto">
      <div id="exModalList"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="exModalCancel">Cerrar</button>
    </div>
  </div>
</div>

<!-- KRI Edit Modal -->
<div class="modal-overlay hidden" id="kriModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">
        <h2 id="modalTitle">Editar KRI</h2>
      </div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <!-- Campos de contexto (solo lectura) -->
      <div class="form-row" style="grid-template-columns:1fr 1fr;margin-bottom:0">
        <div class="form-group">
          <label>Función</label>
          <div id="fieldFuncion" class="field-readonly"></div>
        </div>
        <div class="form-group">
          <label>Categoría</label>
          <div id="fieldCategoria" class="field-readonly"></div>
        </div>
      </div>
      <div class="form-row" style="grid-template-columns:1fr 2fr;margin-bottom:.75rem">
        <div class="form-group">
          <label>Subcategoría</label>
          <div id="fieldSubcategoria" class="field-readonly"></div>
        </div>
        <div class="form-group">
          <label>Descripción</label>
          <div id="fieldDescripcion" class="field-readonly" style="font-size:.82rem;line-height:1.4"></div>
        </div>
      </div>
      <hr style="border:none;border-top:1px solid var(--border-soft);margin:.25rem 0 .75rem">
      <div class="info-box" id="modalExamplesBox" style="display:none">
        <div class="info-label">Ejemplos de implementación</div>
        <div class="info-value" id="modalExamples"></div>
      </div>
      <form id="kriForm" autocomplete="off">
        <div class="form-group">
          <label>Nombre / Título del KRI</label>
          <input type="text" id="kri_name" placeholder="Ej: % de activos sin inventariar">
        </div>
        <div class="form-group">
          <label>Descripción del KRI</label>
          <textarea id="kri_description" rows="2" placeholder="Descripción del indicador..."></textarea>
        </div>
        <div class="form-group">
          <label>Fórmula de Cálculo</label>
          <textarea id="kri_formula" rows="2" placeholder="Ej: (Activos no registrados / Total activos) × 100"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Valoración actual (0–100)</label>
            <input type="number" id="kri_valoracion" min="0" max="100" step="0.1" placeholder="0.0">
          </div>
          <div class="form-group">
            <label>Nivel CMMI</label>
            <div class="field-readonly" id="cmmiLevelHint" style="font-weight:700;font-size:.95rem"></div>
          </div>
          <div class="form-group">
            <label>CMMI Flag</label>
            <select id="kri_cmmi_flag" style="background:var(--bg-base);border:1px solid var(--border-soft);color:var(--text-primary);border-radius:6px;padding:.6rem .85rem;font-size:.9rem;width:100%">
              <option value="">— seleccionar —</option>
              <option value="POSITIVO">POSITIVO (↑ = mejor)</option>
              <option value="NEGATIVO">NEGATIVO (↑ = peor)</option>
            </select>
          </div>
        </div>
      </form>
      <!-- History -->
      <div id="kriHistoryBox" style="display:none;margin-top:1.25rem">
        <div style="font-size:.78rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem">Historial de valoraciones</div>
        <div id="kriHistoryList" style="max-height:180px;overflow-y:auto;font-size:.82rem"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="btnDeleteKri" style="display:none">Eliminar KRI</button>
      <button class="btn btn-secondary" id="btnCancelKri">Cancelar</button>
      <button class="btn btn-primary" id="btnSaveKri">Guardar KRI</button>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script src="/js/data.js"></script>
</body>
</html>
