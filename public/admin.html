<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — CISOToolkit</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="app-container">

  <!-- Topbar -->
  <header class="topbar">
    <a class="brand" href="/heatmap.html">
      <div class="brand-mark">🛡</div>
      <span>CISOToolkit</span>
    </a>
    <div class="topbar-divider"></div>
    <nav class="topbar-nav">
      <a href="/heatmap.html">Heatmap</a>
      <a href="/data.html">Key Risk Indicators</a>
      <a href="/admin.html" class="active">Admin</a>
    </nav>
    <div class="topbar-spacer"></div>
    <div class="topbar-right">
      <div class="live-badge">
        <div class="live-dot"></div>
        LIVE
      </div>
      <div class="topbar-user">
        <div class="avatar">👤</div>
        <span id="topbarUser" style="font-size:.78rem"></span>
        <button class="btn-logout" id="logoutBtn">Salir</button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <div class="page-header">
      <div class="page-header-text">
        <div class="page-header-framework">Panel de Control</div>
        <div class="page-header-title">Gestión de Usuarios</div>
      </div>
      <div style="margin-left:auto;align-self:center;font-size:.78rem;color:var(--text-muted)" id="appVersion"></div>
    </div>

    <div class="card">
      <table class="kri-table" id="usersTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Rol</th>
            <th>Email</th>
            <th>Verificado</th>
            <th>Creado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="usersBody">
          <tr><td colspan="7" style="text-align:center;color:var(--text-muted)">Cargando…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Heatmaps del dominio -->
    <div class="page-header" style="margin-top:2rem">
      <div class="page-header-text">
        <div class="page-header-framework">Dominio</div>
        <div class="page-header-title" id="domainHeatmapsTitle">Heatmaps del Dominio</div>
      </div>
    </div>
    <div class="card">
      <table class="kri-table" id="heatmapsTable">
        <thead>
          <tr>
            <th>Usuario</th>
            <th>Heatmap</th>
            <th>KRIs</th>
            <th>Modo</th>
            <th>Última actualización</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="heatmapsBody">
          <tr><td colspan="6" style="text-align:center;color:var(--text-muted)">Cargando…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Modal: ver heatmap de usuario -->
<dialog id="hmDialog" class="admin-dialog" style="max-width:620px;width:90vw">
  <h3 class="dialog-title" id="hmDialogTitle">Heatmap</h3>
  <div id="hmDialogContent" style="margin-top:.75rem;max-height:60vh;overflow-y:auto"></div>
  <div style="display:flex;justify-content:flex-end;margin-top:1rem">
    <button class="btn-secondary" id="hmClose">Cerrar</button>
  </div>
</dialog>

<!-- Modal: cambiar contraseña -->
<dialog id="pwdDialog" class="admin-dialog">
  <form id="pwdForm" method="dialog">
    <h3 class="dialog-title">Cambiar contraseña</h3>
    <p id="pwdUserLabel" style="color:var(--text-muted);margin-bottom:1rem;font-size:.85rem"></p>
    <div class="filter-group" style="margin-bottom:.75rem">
      <label>Nueva contraseña</label>
      <input type="password" id="pwdNew" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
    </div>
    <div class="filter-group" style="margin-bottom:1.25rem">
      <label>Confirmar contraseña</label>
      <input type="password" id="pwdConfirm" placeholder="Repite la contraseña" autocomplete="new-password">
    </div>
    <div style="display:flex;gap:.75rem;justify-content:flex-end">
      <button type="button" class="btn-secondary" id="pwdCancel">Cancelar</button>
      <button type="button" class="btn-primary" id="pwdSave">Guardar</button>
    </div>
  </form>
</dialog>

<script src="/js/common.js"></script>
<script>
(async () => {
  await initTopbar('admin');

  if (window._userRole !== 'ADMIN') {
    window.location.href = '/heatmap.html';
    return;
  }

  fetch('/api/version').then(r => r.json()).then(d => {
    const el = document.getElementById('appVersion');
    if (el) el.textContent = d.version;
  });

  await loadUsers();
  await loadDomainHeatmaps();
})();

async function loadUsers() {
  const res = await fetch('/api/admin/users');
  if (!res.ok) { toast('Error al cargar usuarios', 'error'); return; }
  const users = await res.json();
  renderUsers(users);
}

function renderUsers(users) {
  const tbody = document.getElementById('usersBody');
  if (!users.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted)">Sin usuarios</td></tr>';
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td>${u.id}</td>
      <td><strong>${esc(u.username)}</strong></td>
      <td><span class="role-badge role-${u.role.toLowerCase()}">${esc(u.role)}</span></td>
      <td>${u.email ? esc(u.email) : '<span style="color:var(--text-muted)">—</span>'}</td>
      <td>${u.email_verified ? '<span style="color:var(--n5-color)">✓</span>' : '<span style="color:var(--text-muted)">—</span>'}</td>
      <td style="font-size:.78rem;color:var(--text-muted)">${u.created_at ? u.created_at.slice(0,16) : '—'}</td>
      <td>
        <button class="btn-secondary btn-sm" onclick="openPwdDialog(${u.id}, '${esc(u.username)}')">Contraseña</button>
        <button class="btn-danger btn-sm" onclick="deleteUser(${u.id}, '${esc(u.username)}')">Eliminar</button>
      </td>
    </tr>
  `).join('');
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let _pwdUserId = null;

function openPwdDialog(id, username) {
  _pwdUserId = id;
  document.getElementById('pwdUserLabel').textContent = `Usuario: ${username}`;
  document.getElementById('pwdNew').value = '';
  document.getElementById('pwdConfirm').value = '';
  document.getElementById('pwdDialog').showModal();
}

document.getElementById('pwdCancel').addEventListener('click', () => {
  document.getElementById('pwdDialog').close();
});

document.getElementById('pwdSave').addEventListener('click', async () => {
  const pwd = document.getElementById('pwdNew').value;
  const confirm = document.getElementById('pwdConfirm').value;
  if (pwd.length < 8) { toast('Mínimo 8 caracteres', 'error'); return; }
  if (pwd !== confirm) { toast('Las contraseñas no coinciden', 'error'); return; }

  const res = await fetch(`/api/admin/users/${_pwdUserId}/password`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pwd })
  });
  const data = await res.json();
  if (!res.ok) { toast(data.error || 'Error al cambiar contraseña', 'error'); return; }

  document.getElementById('pwdDialog').close();
  toast('Contraseña actualizada');
});

async function loadDomainHeatmaps() {
  const res = await fetch('/api/admin/domain-heatmaps');
  if (!res.ok) return;
  const rows = await res.json();

  // Update section title with domain
  if (rows.length) {
    const domain = rows[0].email?.split('@')[1];
    if (domain) {
      const title = document.getElementById('domainHeatmapsTitle');
      if (title) title.textContent = `Heatmaps del Dominio — @${domain}`;
    }
  }

  const tbody = document.getElementById('heatmapsBody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-muted)">Sin usuarios en este dominio</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => {
    const name   = r.heatmap_name ? `<strong>${esc(r.heatmap_name)}</strong>` : '<span style="color:var(--text-muted)">—</span>';
    const modo   = r.scratch_mode ? '<span style="color:var(--accent);font-size:.75rem">Scratch</span>' : '<span style="color:var(--text-muted);font-size:.75rem">Escenario</span>';
    const update = r.last_update ? r.last_update.slice(0,16) : '—';
    return `
      <tr>
        <td><strong>${esc(r.username)}</strong></td>
        <td>${name}</td>
        <td>${r.kri_count ?? 0}</td>
        <td>${modo}</td>
        <td style="font-size:.78rem;color:var(--text-muted)">${update}</td>
        <td><button class="btn-secondary btn-sm" onclick="viewHeatmap(${r.id},'${esc(r.username)}','${esc(r.heatmap_name||'')}')">Ver</button></td>
      </tr>`;
  }).join('');
}

async function viewHeatmap(userId, username, heatmapName) {
  const res = await fetch(`/api/admin/heatmap/${userId}`);
  if (!res.ok) { toast('Error al cargar heatmap', 'error'); return; }
  const data = await res.json();

  document.getElementById('hmDialogTitle').textContent =
    heatmapName ? `${username} — ${heatmapName}` : `Heatmap de ${username}`;

  const cmmiColor = v => {
    if (v == null) return 'var(--text-muted)';
    if (v < 20)  return 'var(--n1-color,#ef4444)';
    if (v < 40)  return '#f97316';
    if (v < 60)  return '#fbbf24';
    if (v < 80)  return '#a3e635';
    return '#16a34a';
  };

  const rows = data.flatMap(fn =>
    fn.categories.map(cat => {
      const v = cat.avgValoracion;
      const val = v != null ? v.toFixed(1) : '—';
      const color = cmmiColor(v);
      return `<tr>
        <td style="font-size:.78rem;color:var(--text-muted)">${esc(fn.code)}</td>
        <td style="font-size:.8rem">${esc(cat.code)}</td>
        <td style="font-size:.78rem;color:var(--text-muted)">${esc(cat.name)}</td>
        <td style="text-align:right;font-weight:600;color:${color}">${val}</td>
        <td style="text-align:right;font-size:.75rem;color:var(--text-muted)">${cat.kriCount}</td>
      </tr>`;
    })
  );

  document.getElementById('hmDialogContent').innerHTML = rows.length
    ? `<table class="kri-table" style="font-size:.82rem">
        <thead><tr><th>Función</th><th>Categoría</th><th>Nombre</th><th style="text-align:right">Avg</th><th style="text-align:right">KRIs</th></tr></thead>
        <tbody>${rows.join('')}</tbody>
       </table>`
    : '<p style="color:var(--text-muted);text-align:center">Sin KRIs registrados</p>';

  document.getElementById('hmDialog').showModal();
}

document.getElementById('hmClose').addEventListener('click', () => {
  document.getElementById('hmDialog').close();
});

async function deleteUser(id, username) {
  if (!confirm(`¿Eliminar el usuario "${username}"? Esta acción no se puede deshacer.`)) return;

  const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (!res.ok) { toast(data.error || 'Error al eliminar usuario', 'error'); return; }

  toast(`Usuario "${username}" eliminado`);
  await loadUsers();
}
</script>
</body>
</html>
